openapi: 3.1.0
info:
  title: AURA — Ashesi University Resource Allocation API
  version: "1.0.0"
  description: >
    Contract-first REST API for AURA, Ashesi University's resource allocation and
    reservation platform (§8). JSON over HTTPS,
    versioned under /api/v1. Errors use application/problem+json (RFC 9457) with a
    stable machine `code`. Cursor pagination via ?limit & ?cursor. This document is
    the source of truth from which the web and mobile typed clients are generated.
servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.aura.ashesi.edu
    description: Production
security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - { name: Auth }
  - { name: Users }
  - { name: Catalogue }
  - { name: Scheduling }
  - { name: Availability }
  - { name: Bookings }
  - { name: Notifications }
  - { name: Reports }
  - { name: Operational }

paths:
  /healthz:
    get:
      tags: [Operational]
      summary: Liveness probe
      security: []
      responses: { "200": { description: OK } }
  /readyz:
    get:
      tags: [Operational]
      summary: Readiness probe (DB connectivity)
      security: []
      responses:
        "200": { description: Ready }
        "503": { description: Not ready }

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate with email + password (+ MFA code if enabled)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                mfa_code: { type: string }
      responses:
        "200":
          description: Tokens issued; cookies set
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401": { $ref: "#/components/responses/Problem" }
        "423": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token → new access token
      security: []
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/TokenResponse" } } } }
        "401": { $ref: "#/components/responses/Problem" }
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current refresh token
      responses: { "204": { description: No Content } }
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current user and resolved permissions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  permissions: { type: array, items: { type: string } }
  /api/v1/auth/password/forgot:
    post:
      tags: [Auth]
      summary: Request a password reset (always 200; no user enumeration)
      security: []
      requestBody:
        content: { application/json: { schema: { type: object, properties: { email: { type: string } } } } }
      responses: { "200": { description: OK } }
  /api/v1/auth/password/reset:
    post:
      tags: [Auth]
      summary: Reset password with a token
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties: { token: { type: string }, new_password: { type: string } }
      responses: { "204": { description: No Content }, "401": { $ref: "#/components/responses/Problem" } }
  /api/v1/auth/mfa/enrol:
    post:
      tags: [Auth]
      summary: Begin TOTP enrolment
      responses:
        "200":
          description: Provisioning URI and manual TOTP secret
          content:
            application/json:
              schema:
                type: object
                required: [provisioning_uri, secret]
                properties:
                  provisioning_uri: { type: string }
                  secret: { type: string }
  /api/v1/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Confirm TOTP and enable MFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses: { "204": { description: Enabled } }

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users (SYSTEM_ADMIN)
      parameters:
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Cursor" }
        - { name: role, in: query, schema: { $ref: "#/components/schemas/Role" } }
        - { name: status, in: query, schema: { type: string } }
      responses: { "200": { description: OK }, "403": { $ref: "#/components/responses/Problem" } }
    post:
      tags: [Users]
      summary: Create a user (SYSTEM_ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, full_name, role]
              properties:
                email: { type: string }
                password: { type: string }
                full_name: { type: string }
                role: { $ref: "#/components/schemas/Role" }
                department_id: { type: string, format: uuid, nullable: true }
      responses: { "201": { description: Created }, "403": { $ref: "#/components/responses/Problem" } }

  /api/v1/buildings:
    get:
      tags: [Catalogue]
      summary: List buildings
      parameters:
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Cursor" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Building" } }
    post:
      tags: [Catalogue]
      summary: Create a building (ROOM_MANAGE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code: { type: string }
                name: { type: string }
                campus: { type: string, nullable: true }
      responses: { "201": { description: Created }, "403": { $ref: "#/components/responses/Problem" } }

  /api/v1/buildings/{id}:
    get:
      tags: [Catalogue]
      summary: Get building detail
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Building" }
        "404": { $ref: "#/components/responses/Problem" }

  /api/v1/buildings/{id}/images:
    post:
      tags: [Catalogue]
      summary: Upload a building main image and gallery images (ROOM_MANAGE)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                main: { type: string, format: binary }
                gallery:
                  type: array
                  items: { type: string, format: binary }
      responses:
        "200":
          description: Updated building
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Building" }
        "503": { $ref: "#/components/responses/Problem" }

  /api/v1/equipment:
    get:
      tags: [Catalogue]
      summary: List equipment
      parameters:
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Cursor" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Equipment" } }
    post:
      tags: [Catalogue]
      summary: Create equipment (ROOM_MANAGE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code: { type: string }
                name: { type: string }
      responses: { "201": { description: Created }, "403": { $ref: "#/components/responses/Problem" } }

  /api/v1/equipment/{id}:
    get:
      tags: [Catalogue]
      summary: Get equipment detail
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Equipment" }
        "404": { $ref: "#/components/responses/Problem" }

  /api/v1/equipment/{id}/images:
    post:
      tags: [Catalogue]
      summary: Upload an equipment main image and gallery images (ROOM_MANAGE)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                main: { type: string, format: binary }
                gallery:
                  type: array
                  items: { type: string, format: binary }
      responses:
        "200":
          description: Updated equipment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Equipment" }
        "503": { $ref: "#/components/responses/Problem" }

  /api/v1/rooms:
    get:
      tags: [Catalogue]
      summary: List/filter rooms (FR6 filters)
      parameters:
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Cursor" }
        - { name: building_id, in: query, schema: { type: string, format: uuid } }
        - { name: min_capacity, in: query, schema: { type: integer } }
        - { name: room_type, in: query, schema: { $ref: "#/components/schemas/RoomType" } }
        - { name: equipment, in: query, schema: { type: string }, description: Comma-separated equipment codes or names }
        - { name: q, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Room" } }
                  next_cursor: { type: string, nullable: true }

  /api/v1/rooms/{id}:
    get:
      tags: [Catalogue]
      summary: Get room detail
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  room: { $ref: "#/components/schemas/Room" }
                  equipment:
                    type: array
                    nullable: true
                    items: { $ref: "#/components/schemas/RoomEquipment" }
        "404": { $ref: "#/components/responses/Problem" }

  /api/v1/rooms/{id}/images:
    post:
      tags: [Catalogue]
      summary: Upload a room main image and gallery images (ROOM_MANAGE)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                main: { type: string, format: binary }
                gallery:
                  type: array
                  items: { type: string, format: binary }
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Room" }
        "503": { $ref: "#/components/responses/Problem" }

  /api/v1/availability/search:
    get:
      tags: [Availability]
      summary: Find rooms free for an entire window (FR6, §7.1)
      parameters:
        - { name: date, in: query, required: true, schema: { type: string, format: date } }
        - { name: start, in: query, required: true, schema: { type: string, example: "14:00" } }
        - { name: end, in: query, required: true, schema: { type: string, example: "16:00" } }
        - { name: building_id, in: query, schema: { type: string, format: uuid } }
        - { name: min_capacity, in: query, schema: { type: integer } }
        - { name: room_type, in: query, schema: { $ref: "#/components/schemas/RoomType" } }
        - { name: equipment, in: query, schema: { type: string } }
      responses:
        "200":
          description: Available rooms with free sub-intervals
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        room: { $ref: "#/components/schemas/Room" }
                        free_intervals:
                          type: array
                          items: { type: object, properties: { start: { type: integer }, end: { type: integer } } }

  /api/v1/calendar:
    get:
      tags: [Availability]
      summary: Unified calendar blocks (FR10)
      parameters:
        - { name: view, in: query, schema: { type: string, enum: [day, week, month] } }
        - { name: date, in: query, required: true, schema: { type: string, format: date } }
        - { name: room_id, in: query, schema: { type: string, format: uuid } }
        - { name: building_id, in: query, schema: { type: string, format: uuid } }
      responses: { "200": { description: OK } }

  /api/v1/bookings:
    post:
      tags: [Bookings]
      summary: Submit a booking request (FR7)
      parameters:
        - { name: Idempotency-Key, in: header, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_id, purpose, attendee_count, starts_at, ends_at]
              properties:
                room_id: { type: string, format: uuid }
                purpose: { type: string }
                attendee_count: { type: integer, minimum: 1 }
                starts_at: { type: string, format: date-time }
                ends_at: { type: string, format: date-time }
      responses:
        "201":
          description: Created (PENDING)
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: "#/components/schemas/Booking" }
                  competing_pending: { type: integer }
        "422": { $ref: "#/components/responses/Problem", description: "Conflicts with lecture/maintenance, capacity, or past" }
    get:
      tags: [Bookings]
      summary: List bookings (scope mine|pending|all)
      description: >
        Returns a cursor-paginated {data, next_cursor} envelope. For scope=pending
        (the approvals queue), each data item is a BookingApprovability object —
        the booking enriched with nested room/requester plus the §11/FR8 blockers
        explaining whether it can be approved. For scope=mine|all, each data item
        is a plain Booking.
      parameters:
        - { name: scope, in: query, schema: { type: string, enum: [mine, pending, all] } }
        - { name: status, in: query, schema: { $ref: "#/components/schemas/BookingStatus" } }
        - { name: room_id, in: query, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/Limit" }
        - { $ref: "#/components/parameters/Cursor" }
      responses:
        "200":
          description: >
            OK. data is an array of Booking (scope mine|all) or
            BookingApprovability (scope pending).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - { $ref: "#/components/schemas/Booking" }
                        - { $ref: "#/components/schemas/BookingApprovability" }
                  next_cursor: { type: string, nullable: true }

  /api/v1/bookings/metrics:
    get:
      tags: [Bookings]
      summary: Current booking request counts by approval status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BookingMetrics" }
        "403": { $ref: "#/components/responses/Problem" }

  /api/v1/bookings/{id}:
    get:
      tags: [Bookings]
      summary: Booking detail (owner or BOOKING_OFFICER)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses: { "200": { description: OK }, "403": { $ref: "#/components/responses/Problem" } }
  /api/v1/bookings/{id}/approve:
    post:
      tags: [Bookings]
      summary: Approve (BOOKING_OFFICER) — atomic, concurrency-safe (§7.3)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Approved }
        "409": { $ref: "#/components/responses/Problem", description: "SLOT_NO_LONGER_AVAILABLE" }
  /api/v1/bookings/{id}/reject:
    post:
      tags: [Bookings]
      summary: Reject with a required note (BOOKING_OFFICER)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody: { content: { application/json: { schema: { type: object, required: [note], properties: { note: { type: string } } } } } }
      responses: { "200": { description: Rejected } }
  /api/v1/bookings/{id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel (owner or BOOKING_OFFICER)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses: { "200": { description: Cancelled } }
  /api/v1/bookings/{id}/override:
    post:
      tags: [Bookings]
      summary: Admin override (BR6) — force approve, optionally cancelling conflicts
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note, cancel_conflicting]
              properties:
                note: { type: string, minLength: 3, maxLength: 500 }
                cancel_conflicting: { type: boolean }
      responses: { "200": { description: Overridden } }

  /api/v1/semesters/{id}/timetable/import:
    post:
      tags: [Scheduling]
      summary: Import a semester timetable (xlsx/csv) (FR4)
      parameters:
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                mode: { type: string, enum: [replace, append] }
      responses: { "202": { description: Import processed; returns status + error report } }

  /api/v1/notifications:
    get: { tags: [Notifications], summary: List notifications, responses: { "200": { description: OK } } }
  /api/v1/notifications/stream:
    get: { tags: [Notifications], summary: Live in-app notifications (SSE), responses: { "200": { description: text/event-stream } } }
  /api/v1/devices:
    post: { tags: [Notifications], summary: Register an Expo push token (mobile), responses: { "204": { description: Registered } } }

  /api/v1/reports/utilisation:
    get:
      tags: [Reports]
      summary: Room utilisation (FR12). format=csv for export.
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - { name: building_id, in: query, schema: { type: string, format: uuid } }
        - { name: format, in: query, schema: { type: string, enum: [json, csv] } }
      responses: { "200": { description: OK } }
  /api/v1/reports/bookings:
    get: { tags: [Reports], summary: Booking statistics (FR12), responses: { "200": { description: OK } } }
  /api/v1/reports/conflicts:
    get: { tags: [Reports], summary: Conflict statistics (FR12), responses: { "200": { description: OK } } }
  /api/v1/reports/overview:
    get:
      tags: [Reports]
      summary: Admin overview dashboard aggregate (FR12). Defaults to the last 30 days.
      description: >
        Single aggregate report powering the admin overview dashboard. When from/to
        are omitted it defaults to the last 30 days (to = today, from = today − 30d).
        In-range counts are scoped by starts_at within [from, to); current-state KPIs
        (pending, active rooms/users, buildings) ignore the range.
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OverviewReport" }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    cookieAuth: { type: apiKey, in: cookie, name: __Host-access }
  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    Limit: { name: limit, in: query, schema: { type: integer, default: 50, maximum: 200 } }
    Cursor: { name: cursor, in: query, schema: { type: string } }
  responses:
    Problem:
      description: RFC 9457 problem document
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Problem:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { type: string, description: Stable machine-readable error code }
        errors:
          type: array
          items: { type: object, properties: { field: { type: string }, message: { type: string } } }
    Role: { type: string, enum: [SYSTEM_ADMIN, TIMETABLE_ADMIN, BOOKING_OFFICER, REQUESTER] }
    RoomType: { type: string, enum: [LECTURE_HALL, LAB, SEMINAR_ROOM, AUDITORIUM, CONFERENCE_ROOM] }
    BookingStatus: { type: string, enum: [PENDING, APPROVED, REJECTED, CANCELLED, EXPIRED] }
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer }
        refresh_token:
          type: string
          description: >
            Only returned when the request sends the header `X-Auth-Mode: bearer`
            (native/mobile clients that cannot use HttpOnly cookies). In the
            default web flow the refresh token is set as an HttpOnly cookie and
            this field is omitted.
        user: { $ref: "#/components/schemas/User" }
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        full_name: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        department_id: { type: string, format: uuid, nullable: true }
        status: { type: string }
        mfa_enabled: { type: boolean }
    Building:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        campus: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        image_public_id: { type: string, nullable: true }
        gallery_urls: { type: array, items: { type: string } }
        gallery_public_ids: { type: array, items: { type: string } }
    Equipment:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        image_url: { type: string, nullable: true }
        image_public_id: { type: string, nullable: true }
        gallery_urls: { type: array, items: { type: string } }
        gallery_public_ids: { type: array, items: { type: string } }
    RoomEquipment:
      type: object
      properties:
        equipment_id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        image_url: { type: string, nullable: true }
        quantity: { type: integer }
    Room:
      type: object
      properties:
        id: { type: string, format: uuid }
        room_code: { type: string }
        name: { type: string }
        building_id: { type: string, format: uuid }
        capacity: { type: integer }
        room_type: { $ref: "#/components/schemas/RoomType" }
        status: { type: string }
        building_code: { type: string }
        building_name: { type: string }
        image_url: { type: string, nullable: true }
        image_public_id: { type: string, nullable: true }
        gallery_urls: { type: array, items: { type: string } }
        gallery_public_ids: { type: array, items: { type: string } }
    Booking:
      type: object
      properties:
        id: { type: string, format: uuid }
        room_id: { type: string, format: uuid }
        requested_by: { type: string, format: uuid }
        purpose: { type: string }
        attendee_count: { type: integer }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        status: { $ref: "#/components/schemas/BookingStatus" }
        review_note: { type: string, nullable: true }
        # Optional nested relations, returned on the enriched approvals projection.
        room: { allOf: [ { $ref: "#/components/schemas/Room" } ], nullable: true }
        requester: { allOf: [ { $ref: "#/components/schemas/User" } ], nullable: true }
    ApprovalBlocker:
      type: object
      description: A reason a pending booking can or cannot be approved (§11/FR8).
      required: [kind, message]
      properties:
        kind:
          type: string
          enum: [LECTURE, MAINTENANCE, APPROVED_BOOKING, COMPETING_PENDING, CAPACITY, IN_PAST]
        message: { type: string }
        starts_at: { type: string, format: date-time, nullable: true }
        ends_at: { type: string, format: date-time, nullable: true }
    BookingApprovability:
      type: object
      description: >
        A pending booking enriched with approvability info, used on the approvals
        queue. can_approve is true only when there are no hard blockers (IN_PAST,
        CAPACITY, LECTURE, MAINTENANCE, APPROVED_BOOKING); competing pendings are
        informational and never block.
      required: [booking, can_approve, blockers, competing_pending_count]
      properties:
        booking: { $ref: "#/components/schemas/Booking" }
        can_approve: { type: boolean }
        blockers:
          type: array
          items: { $ref: "#/components/schemas/ApprovalBlocker" }
        competing_pending_count: { type: integer }
    BookingMetrics:
      type: object
      required: [pending, approved, rejected, total]
      properties:
        pending: { type: integer }
        approved: { type: integer }
        rejected: { type: integer }
        total: { type: integer }
    LabelCount:
      type: object
      required: [label, count]
      properties:
        label: { type: string }
        count: { type: integer }
    OverviewReport:
      type: object
      description: Aggregate report powering the admin overview dashboard (FR12).
      required: [range, kpis, status_breakdown, by_room_type, by_building, top_rooms, series, peak_hours]
      properties:
        range:
          type: object
          required: [from, to]
          properties:
            from: { type: string, format: date }
            to: { type: string, format: date }
        kpis:
          type: object
          required: [total_bookings, pending, approved, rejected, cancelled, expired, active_rooms, active_users, buildings, avg_utilisation_pct, approval_rate_pct]
          properties:
            total_bookings: { type: integer, description: Bookings with starts_at in range }
            pending: { type: integer, description: Current count of PENDING bookings (ignores range) }
            approved: { type: integer }
            rejected: { type: integer }
            cancelled: { type: integer }
            expired: { type: integer }
            active_rooms: { type: integer, description: Current rooms WHERE status='ACTIVE' }
            active_users: { type: integer, description: Current users WHERE status='ACTIVE' }
            buildings: { type: integer, description: Current building count }
            avg_utilisation_pct: { type: number, format: float }
            approval_rate_pct: { type: number, format: float, description: approved/(approved+rejected), 1 decimal }
        status_breakdown:
          type: array
          description: Bookings by status in range; all 5 statuses, zeros included.
          items: { $ref: "#/components/schemas/LabelCount" }
        by_room_type:
          type: array
          description: Bookings by room.room_type in range.
          items: { $ref: "#/components/schemas/LabelCount" }
        by_building:
          type: array
          description: Bookings by building.code in range.
          items: { $ref: "#/components/schemas/LabelCount" }
        top_rooms:
          type: array
          description: Top 8 rooms by utilisation_pct desc over the range.
          items:
            type: object
            required: [room_code, room_name, utilisation_pct, booked_hours]
            properties:
              room_code: { type: string }
              room_name: { type: string }
              utilisation_pct: { type: number, format: float }
              booked_hours: { type: number, format: float }
        series:
          type: array
          description: One point per calendar day in range (institution tz); empty days are zero.
          items:
            type: object
            required: [date, submitted, approved]
            properties:
              date: { type: string, format: date }
              submitted: { type: integer, description: Bookings created that day }
              approved: { type: integer, description: Bookings created that day whose status is APPROVED }
        peak_hours:
          type: array
          description: Bookings by local start hour-of-day 0..23 in range; all 24 hours included.
          items:
            type: object
            required: [hour, count]
            properties:
              hour: { type: integer, minimum: 0, maximum: 23 }
              count: { type: integer }
