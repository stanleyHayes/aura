packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@sentry/cli': false
  esbuild: true
  sharp: true
  unrs-resolver: true

# pnpm catalog: single source of truth for shared dependency versions.
# Workspace packages reference these via "catalog:" to prevent version drift (§0.1).
catalog:
  # React / Next core
  next: 16.2.9
  react: 19.2.7
  react-dom: 19.2.7
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3

  # Language / build
  typescript: 6.0.3

  # Styling
  tailwindcss: 4.3.1
  "@tailwindcss/postcss": 4.3.1
  tailwindcss-animate: 1.0.7
  class-variance-authority: 0.7.1
  tailwind-merge: 3.6.0
  clsx: 2.1.1
  lucide-react: 1.21.0

  # Radix primitives (shadcn/ui base)
  "@radix-ui/react-slot": 1.3.0
  "@radix-ui/react-label": 2.1.10
  "@radix-ui/react-dialog": 1.1.17
  "@radix-ui/react-dropdown-menu": 2.1.18
  "@radix-ui/react-select": 2.3.1
  "@radix-ui/react-tabs": 1.1.15
  "@radix-ui/react-popover": 1.1.17
  "@radix-ui/react-checkbox": 1.3.5
  "@radix-ui/react-avatar": 1.2.0
  "@radix-ui/react-separator": 1.1.10
  "@radix-ui/react-tooltip": 1.2.10
  "@radix-ui/react-toast": 1.2.17

  # Data / state / forms
  "@tanstack/react-query": 5.101.2
  "@tanstack/react-table": 8.21.3
  react-hook-form: 7.80.0
  zod: 4.4.3
  "@hookform/resolvers": 5.4.0
  zustand: 5.0.14

  # Dates / charts / calendar
  date-fns: 4.4.0
  recharts: 3.9.0
  "@schedule-x/react": 4.1.0
  "@schedule-x/calendar": 4.6.0
  "@schedule-x/theme-default": 4.6.0
  "@schedule-x/events-service": 4.6.0

  # Typed API client
  openapi-fetch: 0.17.0
  openapi-typescript: 7.13.0

  # Lint / tooling — ESLint v9 (§17). ESLint 10 is not yet compatible with the
  # eslint-plugin-react bundled by eslint-config-next@16.
  eslint: 9.39.4
  eslint-config-next: 16.2.9

minimumReleaseAgeExclude:
  - '@tanstack/query-async-storage-persister@5.101.2'
  - '@tanstack/query-core@5.101.2'
  - '@tanstack/query-persist-client-core@5.101.2'
  - '@tanstack/react-query-persist-client@5.101.2'
  - '@tanstack/react-query@5.101.2'
