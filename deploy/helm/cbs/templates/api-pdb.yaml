{{- if and .Values.api.enabled .Values.api.pdb.enabled -}}
{{- $component := "api" -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "cbs.fullname" . }}-api
  labels:
    {{- include "cbs.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  minAvailable: {{ .Values.api.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "cbs.componentSelectorLabels" (merge (dict "component" $component) .) | nindent 6 }}
{{- end }}
