{{- if and .Values.serviceMonitor.enabled .Values.api.enabled -}}
{{- $component := "api" -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cbs.fullname" . }}-api
  labels:
    {{- include "cbs.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "cbs.componentSelectorLabels" (merge (dict "component" $component) .) | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      scheme: {{ .Values.serviceMonitor.scheme }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
