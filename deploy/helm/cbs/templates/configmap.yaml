apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cbs.configMapName" . }}
  labels:
    {{- include "cbs.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # Non-secret backend configuration (§19.1). Secrets are injected separately
  # via the Secret/ExternalSecret referenced in deployments — never here.
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extraConfig }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
