{{- /*
ExternalSecret (external-secrets.io) pulls sensitive values from the cloud
secret manager (§14 "Secrets") into a Kubernetes Secret named per cbs.secretName.
No secret material lives in the chart or values. Skipped when an existingSecret
is referenced or when externalSecret is disabled.
*/ -}}
{{- if and .Values.externalSecret.enabled (not .Values.existingSecret) (not .Values.secret.create) -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "cbs.fullname" . }}
  labels:
    {{- include "cbs.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "cbs.secretName" . }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        property: {{ .property }}
    {{- end }}
{{- end }}
