{{- if .Values.api.enabled -}}
{{- $component := "api" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cbs.fullname" . }}-api
  labels:
    {{- include "cbs.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
  {{- with .Values.api.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cbs.componentSelectorLabels" (merge (dict "component" $component) .) | nindent 4 }}
{{- end }}
