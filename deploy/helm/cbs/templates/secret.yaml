{{- /*
A Secret is rendered ONLY when secret.create is explicitly true (local/throwaway
clusters). In real environments use externalSecret (preferred) or existingSecret.
This template never embeds default secret values — `data` is operator-supplied.
*/ -}}
{{- if .Values.secret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cbs.secretName" . }}
  labels:
    {{- include "cbs.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secret.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
