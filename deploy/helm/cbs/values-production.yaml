# Production overlay (§17 "Environments"). Apply with:
#   helm upgrade --install cbs deploy/helm/cbs \
#     -n cbs-production -f deploy/helm/cbs/values-production.yaml
config:
  APP_ENV: production
  S3_BUCKET: cbs-prod
  JWT_KEY_ID: prod-key-1
  CORS_ALLOWED_ORIGINS: https://cbs.example.edu

api:
  replicaCount: 3
  hpa:
    minReplicas: 3
    maxReplicas: 12
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: api
  pdb:
    minAvailable: 2

worker:
  replicaCount: 2
  pdb:
    minAvailable: 1

ingress:
  host: cbs.example.edu
  tls:
    secretName: cbs-tls
  certManager:
    clusterIssuer: letsencrypt-prod

externalSecret:
  remoteRefPrefix: cbs/production
