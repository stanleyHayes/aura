# Render Blueprint (Infrastructure as Code) — AURA BACKEND ONLY.
#
# The web frontend deploys to Vercel (apps/web); only the Go API and its Postgres
# live on Render. Deploy: push to Git, then "New + > Blueprint" in Render → point
# it here. Fill the `sync: false` secrets from production.env (gitignored).
#
# Free tier notes:
#  • Free Postgres has limited storage and expires ~30 days after creation — fine
#    for a demo; upgrade the plan for anything long-lived.
#  • The free web service spins down after ~15 min idle (cold start on next hit).
#  • No pre-deploy hook and no shell on free → the API self-migrates on boot via
#    AUTO_MIGRATE (embedded goose migrations), and the booking-expiry/cleanup
#    sweep is folded into the API, so no separate (paid) worker is needed.
#  • Redis is omitted: rate-limiting and SSE fan-out run in-process (single
#    instance). Add a keyvalue service + REDIS_URL only when scaling out.
#  • Object storage: catalogue images use Cloudinary (CLOUDINARY_*); no S3 needed.

databases:
  - name: aura-postgres
    databaseName: aura
    user: aura
    # uuidv7() polyfill (migration 00001) lets the schema run on PG 16/17.
    postgresMajorVersion: "17"
    plan: free
    ipAllowList: []   # only Render services may connect

services:
  # ── Go API (HTTP) ────────────────────────────────────────────────────────────
  - type: web
    name: aura-api
    runtime: docker
    dockerfilePath: ./deploy/render/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_INSTITUTION_TZ
        value: Africa/Accra
      # Apply embedded migrations on startup (free tier has no pre-deploy/shell).
      - key: AUTO_MIGRATE
        value: "true"
      # Render terminates exactly one proxy hop; read the real client IP from that
      # position in X-Forwarded-For (MED-4).
      - key: TRUSTED_PROXY_COUNT
        value: "1"
      - key: DATABASE_URL
        fromDatabase: { name: aura-postgres, property: connectionString }
      # Auth secrets — set from production.env (openssl-generated). JWT must be
      # >=32 bytes; MFA exactly 32 bytes base64. Kept sync:false so they match the
      # values in production.env rather than a fresh random one.
      - key: JWT_SIGNING_KEY
        sync: false
      - key: JWT_KEY_ID
        value: prod-key-1
      - key: MFA_ENCRYPTION_KEY
        sync: false
      # Allowed browser origin(s) — the Vercel site. Comma-separate to add domains.
      - key: CORS_ALLOWED_ORIGINS
        value: https://auragh.vercel.app
      # Transactional email via Resend SMTP. Username is literally "resend"; the
      # password is the Resend API key (set from production.env). MAIL_FROM uses
      # Resend's shared default sender (no domain verification needed).
      - key: MAIL_HOST
        value: smtp.resend.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        value: resend
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: onboarding@resend.dev
      # Cloudinary image uploads (optional; blank disables uploads).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: aura/catalogue
